# ──────────────────────────────────────────
# MCP Gateway — Docker Compose
# ──────────────────────────────────────────
# docker compose up -d

services:
  # ──────────────────────────────────────────
  # Core Services
  # ──────────────────────────────────────────

  # ── Caddy — Reverse Proxy ────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai-net
    # Reverse proxies to mcp-hub:8080. Cloudflare tunnel upstream configured separately.

  # ── MCP Hub — System Core (Gateway) ───────
  mcp-hub:
    build: ./mcp-hub
    container_name: ai-mcp-hub
    restart: unless-stopped
    ports:
      - "${MCP_HUB_PORT:-8080}:8080"
    volumes:
      - ./mcp-hub/config.yaml:/app/config.yaml:ro
      - ./mcp_servers:/app/mcp_servers:ro
    environment:
      - MCP_HUB_AUTH_TOKEN=${MCP_HUB_AUTH_TOKEN}
    networks:
      - ai-net

  # ──────────────────────────────────────────
  # MCP Services
  # ──────────────────────────────────────────

  # ── GitHub MCP Server (Reserved) ──────────
  # Reserved — not yet implemented. Uncomment when Task-014+ adds source.
  # github-mcp:
  #   build: ./mcp_servers/github
  #   container_name: ai-github-mcp
  #   restart: unless-stopped
  #   environment:
  #     - GITHUB_TOKEN=${GITHUB_TOKEN}
  #     - GITHUB_OWNER=${GITHUB_OWNER}
  #   networks:
  #     - ai-net

  # ── Filesystem MCP Server (Reserved) ──────
  # Reserved — not yet implemented. Uncomment when Task-014+ adds source.
  # filesystem-mcp:
  #   build: ./mcp_servers/filesystem
  #   container_name: ai-filesystem-mcp
  #   restart: unless-stopped
  #   volumes:
  #     - ${MCP_FS_ROOT:-./data}:/data
  #   networks:
  #     - ai-net

  # ── Ombre MCP Server ─────────────────────
  # External Ombre deployment (adapter implemented — Task-009)
  ombre-mcp:
    build: ./mcp_servers/ombre
    container_name: ai-ombre-mcp
    restart: unless-stopped
    environment:
      - OMBRE_ENDPOINT=${OMBRE_ENDPOINT:-http://45.76.169.98:8000}
    networks:
      - ai-net

  # ── ntfy MCP Server ──────────────────────
  # ntfy.sh push notifications (adapter implemented — Task-010)
  ntfy-mcp:
    build: ./mcp_servers/ntfy
    container_name: ai-ntfy-mcp
    restart: unless-stopped
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-ai-infrastructure}
    networks:
      - ai-net

  # ── Cloudflare Tunnel ────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ai-cloudflared
    restart: unless-stopped
    command: tunnel run
    volumes:
      - ./cloudflare/tunnel-config.yaml:/etc/cloudflared/config.yaml:ro
    networks:
      - ai-net
    # Configure tunnel token in cloudflare/tunnel-config.yaml before enabling

volumes:
  caddy_data:
  caddy_config:

networks:
  ai-net:
    driver: bridge
