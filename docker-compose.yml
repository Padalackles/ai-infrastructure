# ──────────────────────────────────────────
# MCP Gateway — Docker Compose
# ──────────────────────────────────────────
# docker compose up -d

services:
  # ──────────────────────────────────────────
  # Core Services
  # ──────────────────────────────────────────

  # ── Caddy — Reverse Proxy ────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-raven-victor.click}
      - CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL:-admin@raven-victor.click}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai-net

  # ── MCP Hub — System Core (Gateway) ───────
  mcp-hub:
    build: ./mcp-hub
    container_name: ai-mcp-hub
    restart: unless-stopped
    ports:
      - "${MCP_HUB_PORT:-8080}:8080"
    volumes:
      - ./mcp-hub/config.yaml:/app/config.yaml:ro
      - ./mcp_servers:/app/mcp_servers:ro
      - ./activity:/app/activity:ro
    environment:
      - MCP_HUB_AUTH_TOKEN=${MCP_HUB_AUTH_TOKEN}
      - NTFY_SERVER=${NTFY_SERVER:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-raven-victor-c503460d}
      - OMBRE_URL=${OMBRE_URL:-http://45.76.169.98:8000/mcp}
      - HUB_EXPOSE_INTERNAL_TOOLS=${HUB_EXPOSE_INTERNAL_TOOLS:-false}
      - OMBRE_TIMEOUT=${OMBRE_TIMEOUT:-10}
    networks:
      - ai-net

  # ── Scheduler — Background Job Engine ──────
  scheduler:
    build: ./services/scheduler
    container_name: ai-scheduler
    restart: unless-stopped
    volumes:
      - ./services/scheduler/config.yaml:/app/config.yaml:ro
    networks:
      - ai-net

  # ──────────────────────────────────────────
  # MCP Services
  # ──────────────────────────────────────────

  # ── GitHub MCP Server (Reserved) ──────────
  # Reserved — not yet implemented. Uncomment when source is added.
  # github-mcp:
  #   build: ./mcp_servers/github
  #   container_name: ai-github-mcp
  #   restart: unless-stopped
  #   environment:
  #     - GITHUB_TOKEN=${GITHUB_TOKEN}
  #     - GITHUB_OWNER=${GITHUB_OWNER}
  #   networks:
  #     - ai-net

  # ── Filesystem MCP Server (Reserved) ──────
  # Reserved — not yet implemented. Uncomment when source is added.
  # filesystem-mcp:
  #   build: ./mcp_servers/filesystem
  #   container_name: ai-filesystem-mcp
  #   restart: unless-stopped
  #   volumes:
  #     - ${MCP_FS_ROOT:-./data}:/data
  #   networks:
  #     - ai-net

  # ── Ombre — EXTERNAL (deployed at 45.76.169.98:8000) ──
  # Ombre runs as a standalone service on this VPS (NOT via this compose file).
  # The MCP Hub connects to it through mcp_servers/ombre/adapter.py (HTTP bridge).
  # This adapter is loaded by Hub discovery — no separate container needed.

  # ── ntfy — EXTERNAL (ntfy.sh SaaS) ────────
  # ntfy notifications route through https://ntfy.sh.
  # The MCP Hub connects through mcp_servers/ntfy/adapter.py (HTTP bridge).
  # This adapter is loaded by Hub discovery — no separate container needed.

  # ── Cloudflare Tunnel (Reserved) ──────────
  # Uncomment when CF_TUNNEL_TOKEN is configured.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: ai-cloudflared
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
  #   networks:
  #     - ai-net

volumes:
  caddy_data:
  caddy_config:

networks:
  ai-net:
    driver: bridge
