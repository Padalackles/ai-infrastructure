# ──────────────────────────────────────────
# ai-infrastructure — Docker Compose
# ──────────────────────────────────────────
# docker compose up -d

version: "3.9"

services:
  # ── Caddy — Reverse Proxy ────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai-net
    # TODO: configure for Cloudflare tunnel upstream

  # ── MCP Hub — System Core ────────────────
  mcp-hub:
    build: ./mcp-hub
    container_name: ai-mcp-hub
    restart: unless-stopped
    ports:
      - "${MCP_HUB_PORT:-8080}:8080"
    volumes:
      - ./mcp-hub/config.yaml:/app/config.yaml:ro
    environment:
      - MCP_HUB_AUTH_TOKEN=${MCP_HUB_AUTH_TOKEN}
    networks:
      - ai-net
    # TODO: implement MCP Hub service

  # ── GitHub MCP Server ────────────────────
  github-mcp:
    build: ./mcp-servers/github
    container_name: ai-github-mcp
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
    networks:
      - ai-net
    # TODO: implement

  # ── Filesystem MCP Server ────────────────
  filesystem-mcp:
    build: ./mcp-servers/filesystem
    container_name: ai-filesystem-mcp
    restart: unless-stopped
    volumes:
      - ${MCP_FS_ROOT:-./data}:/data
    networks:
      - ai-net
    # TODO: implement

  # ── Ombre MCP Server ─────────────────────
  ombre-mcp:
    build: ./mcp-servers/ombre
    container_name: ai-ombre-mcp
    restart: unless-stopped
    environment:
      - OMBRE_API_URL=${OMBRE_API_URL}
      - OMBRE_API_KEY=${OMBRE_API_KEY}
    networks:
      - ai-net
    # TODO: implement

  # ── ntfy MCP Server ──────────────────────
  ntfy-mcp:
    build: ./mcp-servers/ntfy
    container_name: ai-ntfy-mcp
    restart: unless-stopped
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL}
      - NTFY_TOPIC=${NTFY_TOPIC}
    networks:
      - ai-net
    # TODO: implement

  # ── Cloudflare Tunnel ────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ai-cloudflared
    restart: unless-stopped
    command: tunnel run
    volumes:
      - ./cloudflare/tunnel-config.yaml:/etc/cloudflared/config.yaml:ro
    networks:
      - ai-net
    # TODO: configure tunnel token and ingress rules

volumes:
  caddy_data:
  caddy_config:

networks:
  ai-net:
    driver: bridge
